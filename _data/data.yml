hero:
    name: "Pedro Holanda"
    tagline: "Principal Engineer · DuckLabs"
    intro: "I helped build <a href=\"https://duckdb.org\">DuckDB</a>, an open-source database for analytics that gets downloaded over 45 million times a month. I joined in 2018, back when it was a research prototype at CWI Amsterdam, and I have worked on the core engine ever since. I built the CSV engine, the Arrow integration, the ART index, and the Python client. These days I lead <a href=\"https://ducklake.select\">DuckLake</a>. I hold a PhD in database systems from CWI/Leiden and served as COO of DuckDB Labs."
