{% assign projects = site.data.data.projects %}
{% if projects %}
<section class="section projects-section" id="projects-section">

  <h2 class="section-title">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-archive fa-stack-1x fa-inverse"></i>
    </span>
    {{ projects.title }}
  </h2>

  <div class="projects-grid">
    {% for project in projects.assignments %}
    <div class="project-card">
      <h4 class="project-card-title">
        <a href="{{ project.link }}" target="_blank">{{ project.title }}</a>
      </h4>
      {% if project.tagline %}
      <p class="project-card-desc">{{ project.tagline }}</p>
      {% endif %}
      <a href="{{ project.link }}" target="_blank" class="project-card-link">
        <i class="fab fa-github"></i> View on GitHub
      </a>
    </div>
    {% endfor %}
  </div>

</section><!--//section-->
{% endif %}
