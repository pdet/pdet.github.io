        summary: "Parsing CSV sounds simple, but handling encoding, escaping, multi-line values, and type detection at scale is surprisingly complex."
        link: "https://duckdb.org/2023/10/27/csv-sniffer.html"
      - title: "Lessons from Building DuckDB"
        summary: "What building an analytical database from a research prototype to millions of users teaches about systems engineering."
      - title: "Common Benchmarking Mistakes in Databases"
        summary: "Why most database benchmarks are misleading and how to design fair comparisons."
        link: "assets/papers/benchmarking.pdf"
      - title: "Query Execution: Vectorized vs. Compiled"
        summary: "Exploring the trade-offs between vectorized and JIT-compiled query execution for analytical workloads."

