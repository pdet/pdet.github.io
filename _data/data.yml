        date: 2021
        summary: "Introduced the zero-copy integration between DuckDB and Apache Arrow that became the default way to move data between DuckDB and the Python ecosystem."
        tags: ["Arrow", "DuckDB"]

      - title: "DuckDB's CSV Reader and the Pollock Robustness Benchmark: Into the CSV Abyss"
        link: "https://duckdb.org/2025/04/16/duckdb-csv-pollock-benchmark.html"
        authors: <b>Pedro Holanda</b>, <a href="https://szarnyasgabor.github.io/">Gábor Szárnyas</a>, and <a href="https://gerardovitagliano.github.io/">Gerardo Vitagliano</a>
