engineering-work:
    title: Engineering Contributions
    items:
      - title: CSV Reader
        description: "The engine that lets DuckDB read the messiest CSV files in the world — correctly, in parallel, at full speed. Handles encoding, escaping, multi-line values, and type detection without configuration."
        blog_link: "https://duckdb.org/2024/12/05/csv-files-dethroning-parquet-or-not.html"
        icon: "fas fa-table"

      - title: CSV Sniffer
        description: "Point DuckDB at any CSV and it figures out the rest. Detects types, delimiters, quoting styles, and edge cases automatically — no schema definition needed."
        blog_link: "https://duckdb.org/2023/10/27/csv-sniffer.html"
        icon: "fas fa-search"

      - title: Apache Arrow Integration
        description: "Zero-copy data exchange that made DuckDB the bridge between Python's data ecosystem and SQL. Moves data ~38x faster than ODBC."
        blog_link: "https://duckdb.org/2021/12/03/duck-arrow.html"
        icon: "fas fa-exchange-alt"

      - title: ART Persistent Storage
        description: "Made DuckDB's indexes survive restarts. Persistent Adaptive Radix Tree storage that keeps indexes durable across sessions without sacrificing in-memory speed."
        blog_link: "https://duckdb.org/2022/07/27/art-storage.html"
        icon: "fas fa-database"

      - title: BIGNUM Implementation
        description: "When 64-bit integers are not enough. Arbitrary-precision arithmetic for financial and scientific workloads that demand exact results at any scale."
        icon: "fas fa-calculator"

      - title: ADBC Integration
        description: "Arrow Database Connectivity — a modern replacement for ODBC that transfers data at zero copy, ~38x faster."
        blog_link: "https://duckdb.org/2023/08/04/adbc"
        icon: "fas fa-plug"

      - title: Python Client
        description: "Helping make DuckDB the analytical engine Python developers reach for first. Core contributor to the Python client and the UDF framework that lets users extend DuckDB in pure Python."
        blog_link: "https://duckdb.org/2023/07/07/python-udf.html"
        icon: "fab fa-python"

narrative:
    text: |
      I joined <a href="https://duckdb.org">DuckDB</a> when it was a research prototype at CWI Amsterdam — two researchers, zero users, and a bet that analytical databases could be radically simpler. I helped build it into the system that now runs 28 million times a month.
      Along the way I designed core infrastructure — from the CSV parser that handles the messiest files on the internet to the Arrow integration that moves data 38x faster than ODBC.
      In the early days of DuckDB Labs, I served as COO because a small research spinoff needs someone handling operations while the founders focus on the core engine. As the company grew and hired dedicated business staff, I moved back to engineering full-time — that is where I do my best work.
      Currently I lead core infrastructure development as Principal Engineer, focused on <a href="https://github.com/duckdb/ducklake">DuckLake</a> and query processing performance.

vision:
    title: What I Believe
    items:
      - "The future of analytical databases is embedded. Moving data to the database is the wrong abstraction — the database should come to the data."
      - "CSV will never die. Instead of replacing it, we should build systems that handle its full complexity transparently. That is what I work on."
      - "Zero-copy interfaces like Arrow and ADBC will replace ODBC/JDBC as the standard for data exchange within the decade."
      - "The best infrastructure is invisible. If a user has to configure something, we have not finished the job."

