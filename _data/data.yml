engineering-work:
    title: Engineering Contributions
    items:
      - title: CSV Reader
        description: "Parallel CSV ingestion engine used in DuckDB for high-performance analytics. Handles encoding, escaping, multi-line values, and parallel parsing at scale."
        blog_link: "https://duckdb.org/2024/12/05/csv-files-dethroning-parquet-or-not.html"
        icon: "fas fa-table"

      - title: CSV Sniffer
        description: "Automatic detection of CSV types, delimiters, and dialects. Enables DuckDB to read arbitrary CSV files without manual configuration."
        blog_link: "https://duckdb.org/2023/10/27/csv-sniffer.html"
        icon: "fas fa-search"

      - title: Apache Arrow Integration
        description: "Zero-copy data transfer between DuckDB and Arrow, enabling ~38x faster interoperability than ODBC."
        blog_link: "https://duckdb.org/2021/12/03/duck-arrow.html"
        icon: "fas fa-exchange-alt"

      - title: ART Persistent Storage
        description: "Persistent Adaptive Radix Tree indexing for DuckDB. Enables durable indexes that survive process restarts."
        blog_link: "https://duckdb.org/2022/07/27/art-storage.html"
        icon: "fas fa-database"

      - title: BIGNUM Implementation
        description: "Arbitrary precision integer support for analytical workloads in DuckDB."
        icon: "fas fa-calculator"

      - title: ADBC Integration
        description: "Arrow Database Connectivity — a zero-copy data transfer protocol ~38x faster than ODBC."
        blog_link: "https://duckdb.org/2023/08/04/adbc"
        icon: "fas fa-plug"

      - title: Python Client
        description: "Core contributor to DuckDB's Python bindings and the scalar Python UDF framework."
        blog_link: "https://duckdb.org/2023/07/07/python-udf.html"
        icon: "fab fa-python"

narrative:
    text: |
      I helped build <a href="https://duckdb.org">DuckDB</a> from an academic research prototype at CWI Amsterdam into one of the most widely adopted analytical databases.
      Along the way I designed and implemented core systems including the parallel CSV ingestion pipeline, Apache Arrow integration, persistent ART indexing, and arbitrary-precision integer support.
      I served as COO of DuckDB Labs from 2021 to 2023, helping scale the company from its earliest days, and now lead core infrastructure development as Principal Engineer.
      My current focus includes <a href="https://github.com/duckdb/ducklake">DuckLake</a> and continued work on query processing performance.

