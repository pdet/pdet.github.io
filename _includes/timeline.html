{% assign timeline = site.data.data.timeline %}
{% if timeline %}
<section class="section timeline-section" id="career">
  <h2 class="section-title">{{ timeline.title }}</h2>

  <div class="timeline">
    {% for item in timeline.items %}
    <div class="timeline-item">
      <span class="timeline-time">{{ item.time }}</span>
      <div class="timeline-content">
        <h3 class="timeline-role">{{ item.role }} <span class="timeline-company">· {{ item.company }}</span></h3>
        {% if item.detail %}
        <p class="timeline-detail">{{ item.detail }}</p>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endif %}
