engineering-work:
    title: Engineering Contributions
    items:
      - title: CSV Engine
        description: "Parallel CSV parser with automatic detection of types, delimiters, and dialects. Scores highest on the Pollock robustness benchmark (2025) across all tested systems. No schema definition needed."
        blog_link: "https://duckdb.org/2025/04/16/duckdb-csv-pollock-benchmark.html"
        icon: "fas fa-table"

      - title: Arrow & ADBC Integration
        description: "Direct memory sharing between DuckDB and Python's data ecosystem via Apache Arrow. ADBC provides a modern connectivity standard that eliminates the serialization overhead of ODBC."
        blog_link: "https://duckdb.org/2021/12/03/duck-arrow.html"
        icon: "fas fa-exchange-alt"

      - title: DuckLake
        description: "DuckDB's integrated data lake format. A SQL-native catalog that eliminates the gap between database and lakehouse."
        blog_link: "https://github.com/duckdb/ducklake"
        icon: "fas fa-water"

      - title: ART Persistent Storage
        description: "Made DuckDB's indexes survive restarts. A storage layer that keeps index data durable on disk without sacrificing the speed of in-memory lookups."
        blog_link: "https://duckdb.org/2022/07/27/art-storage.html"
        icon: "fas fa-database"

      - title: BIGNUM Implementation
        description: "When 64-bit integers overflow, financial calculations go silently wrong. Built DuckDB's large-number arithmetic from scratch so that bank balances and scientific measurements are always exact."
        icon: "fas fa-calculator"

      - title: Python Client
        description: "Built core parts of DuckDB's Python client and the UDF framework that lets users extend the engine in pure Python - no C++ required."
        blog_link: "https://duckdb.org/2023/07/07/python-udf.html"
        icon: "fab fa-python"

narrative:
    text: |
      I joined <a href="https://duckdb.org">DuckDB</a> when it was a research prototype at CWI Amsterdam - two researchers, zero users, and a bet that analytical databases could be radically simpler. I have been building its core infrastructure from the start.
      When DuckDB Labs spun out of CWI, I took on the COO role - building the company while still writing code. As the team grew past the stage where one person could do both, I chose to return to engineering full-time. The work I care most about lives in the codebase.
      Currently I lead core infrastructure development as Principal Engineer, focused on <a href="https://github.com/duckdb/ducklake">DuckLake</a> and query processing performance. I also help onboard new contributors and review the design of subsystems across the engine.

vision:
    title: Engineering Principles
    items:
      - "The future of analytical databases is in-process. Moving data to the database is the wrong abstraction - the database should come to the data. That is the bet I made when I joined DuckDB."
      - "CSV will never die. Instead of replacing messy formats, build systems that handle their full complexity transparently. That philosophy drives the work I do on DuckDB's data ingestion layer."
      - "The best database engines are built by small teams that understand the whole system. I value the tight feedback loop between engineers who can reason about every layer of the stack."

