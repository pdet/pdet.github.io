engineering-work:
    title: Engineering Contributions
    items:
      - title: DuckLake
        description: "Leading development of DuckDB's integrated data lake format. A SQL-native catalog that stores table metadata in any database while data lives in open formats like Parquet on object storage."
        blog_link: "https://github.com/duckdb/ducklake"
        icon: "fas fa-warehouse"

      - title: CSV Engine
        description: "Designed and built DuckDB's parallel CSV parser with automatic type, delimiter, and dialect detection. Scores highest on the Pollock robustness benchmark (2025) across all tested systems."
        blog_link: "https://duckdb.org/2025/04/16/duckdb-csv-pollock-benchmark.html"
        icon: "fas fa-table"

      - title: Arrow & ADBC Integration
        description: "Built the zero-copy integration between DuckDB and Python's data ecosystem via Apache Arrow. ADBC provides a modern connectivity standard that eliminates the serialization overhead of ODBC."
        blog_link: "https://duckdb.org/2021/12/03/duck-arrow.html"
        icon: "fas fa-exchange-alt"

      - title: ART Persistent Storage
        description: "Designed and implemented the persistent storage layer for DuckDB's Adaptive Radix Tree indexes. Keeps index data durable on disk without sacrificing in-memory lookup speed."
        blog_link: "https://duckdb.org/2022/07/27/art-storage.html"
        icon: "fas fa-database"

      - title: Python Client
        description: "Built DuckDB's Python client foundations and the UDF framework that lets users extend the engine in pure Python - no C++ required."
        blog_link: "https://duckdb.org/2023/07/07/python-udf.html"
        icon: "fab fa-python"

      - title: BIGNUM Implementation
        description: "Implemented arbitrary-precision integer arithmetic for DuckDB. Handles HUGEINT and DECIMAL types so that financial calculations and scientific measurements stay exact beyond 64-bit limits."
        icon: "fas fa-calculator"

narrative:
    text: |
      <p>I joined <a href="https://duckdb.org">DuckDB</a> at CWI Amsterdam when the project had two researchers, zero users, and a bet that analytical databases could be radically simpler. I have been building its infrastructure from the start.</p>
      <p>When DuckDB Labs spun out of CWI, I took on the COO role - hiring the early team, shaping the open-source strategy, and building the company while still writing code. That experience gave me a perspective on the full lifecycle of open-source infrastructure that informs every design decision I make today. When the company was ready for dedicated operations leadership, I chose to return to engineering full-time.</p>
      <p>As Principal Engineer, I lead the development of <a href="https://github.com/duckdb/ducklake">DuckLake</a> and drive query processing performance. I mentor new contributors, lead design reviews across subsystems, and help set technical direction for the engine.</p>

vision:
    title: Engineering Principles
    items:
      - "The future of analytical databases is in-process. Moving data to the database is the wrong abstraction - the database should come to the data. That is the bet I made when I joined DuckDB."
      - "CSV will never die. Instead of replacing messy formats, build systems that handle their full complexity transparently. That philosophy drives the work I do on DuckDB's data ingestion layer."
      - "Databases should meet users where they are. That is why I built DuckDB's zero-copy Arrow integration and ADBC - the best data system works seamlessly with every tool in your stack, not the other way around."

