{% assign hero = site.data.data.hero %}
{% assign sidebar = site.data.data.sidebar %}
<section class="section hero-section" id="about" tabindex="-1">
  <div class="hero-header">
    <img class="hero-avatar" src="{{ site.baseurl }}/assets/images/{{ sidebar.avatar }}" alt="Pedro Holanda" width="72" height="72" fetchpriority="high" />
    <div class="hero-header-text">
      <h1 class="hero-name">{{ hero.name }}</h1>
      <p class="hero-tagline">{{ hero.tagline }}</p>
    </div>
  </div>

  <div class="hero-intro">
    <p>{{ hero.intro }}</p>
  </div>

  <ul class="hero-links">
    {% for link in hero.links %}
    <li><a href="{{ link.url }}" {% unless link.url contains '#' or link.url contains 'mailto' %}target="_blank" rel="noopener noreferrer"{% endunless %}>{{ link.label }}</a></li>
    {% endfor %}
  </ul>
</section>
