systems:
    title: Systems
    intro: ""
    items:
      - title: DuckLake
        description: "A data lake and catalog format built on SQL and Parquet. I led it from pre-production 0.1 to 1.0, co-writing the <a href=\"https://ducklake.select/docs/stable/specification/introduction\" target=\"_blank\" rel=\"noopener noreferrer\">format specification</a> since 0.1 and managing its releases."
        link: "https://ducklake.select"
        source_link: "https://github.com/duckdb/ducklake"

      - title: CSV engine
        description: "A parallel CSV parser that detects types, delimiters, and dialects on its own. The Pollock benchmark, designed independently of DuckDB, measured it as the most robust parser of any tested system: 9.6 out of 10 configured, 8.4 fully automatic. Our only joint work with the benchmark authors was adding DuckDB to it."
        link: "https://duckdb.org/2025/04/16/duckdb-csv-pollock-benchmark.html"
        source_link: "https://github.com/duckdb/duckdb/pulls?q=is%3Apr+is%3Amerged+author%3Apdet+csv"

      - title: Arrow & ADBC integration
        description: "The zero-copy Arrow bridge between DuckDB and the Python data ecosystem, plus DuckDB's driver for the ADBC standard. It has been the default way to move data in and out of the engine since 2021."
        link: "https://duckdb.org/2021/12/03/duck-arrow.html"
        source_link: "https://github.com/duckdb/duckdb/pulls?q=is%3Apr+is%3Amerged+author%3Apdet+arrow"

      - title: Async I/O
        description: "Read-ahead infrastructure in DuckDB's I/O layer that overlaps fetching with compute, so scans over Parquet and object storage spend less time waiting on the network."
        link: "https://github.com/duckdb/duckdb/pulls?q=is%3Apr+is%3Amerged+author%3Apdet+async"

      - title: BIGNUM arithmetic
        description: "Arbitrary-precision integers for DuckDB, so values past the 64-bit limit stay exact instead of overflowing."
        link: "https://github.com/duckdb/duckdb/pulls?q=is%3Apr+is%3Amerged+author%3Apdet+varint"

      - title: ART index
        description: "DuckDB's adaptive radix tree index. I implemented the original index and later its persistent on-disk storage, so it stays durable without losing in-memory lookup speed."
        link: "https://duckdb.org/2022/07/27/art-storage.html"
        source_link: "https://github.com/duckdb/duckdb/tree/main/src/execution/index/art"

      - title: Python client & UDFs
        description: "The foundations of DuckDB's most-used client, and the framework that lets users extend the engine in pure Python."
        link: "https://duckdb.org/2023/07/07/python-udf.html"
        source_link: "https://github.com/duckdb/duckdb/pulls?q=is%3Apr+is%3Amerged+author%3Apdet+python"

